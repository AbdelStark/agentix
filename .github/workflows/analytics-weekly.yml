name: Weekly Telemetry Analytics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1"

permissions:
  contents: read

jobs:
  quality-analytics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.4"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate telemetry summary artifact
        run: bun run src/cli/agentix.ts analytics summary --window 7d --json --write-report --exclude-command analytics > telemetry-summary.json

      - name: Generate top failure artifact
        run: bun run src/cli/agentix.ts analytics failures --window 7d --top 10 --json --exclude-command analytics > telemetry-failures.json

      - name: Upload telemetry analytics bundle
        uses: actions/upload-artifact@v4
        with:
          name: telemetry-analytics
          path: |
            telemetry-summary.json
            telemetry-failures.json
            docs/ops/quality-report.md
            .agentix/analytics/
